<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/src/styles/vendor/reset.css">
    <link rel="stylesheet" href="/src/styles/global.css">

    <link rel="stylesheet" href="./login.css">

    <link rel="stylesheet" href="/src/styles/components/input-form.css">
    <link rel="stylesheet" href="/src/styles/components/action-button.css">

    <title>Login - NovoUso Amazônia</title>
</head>

<body>
    <main>
        <div class="container-left">
            <p class="display">Dar um novo uso de um item é cuidar da nossa natureza.</p>
        </div>

        <div class="container-right">
            <div class="form">
                <h2>Entrar na sua conta</h2>

                <form action="">
                    <div class="input-form">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" placeholder="Digite o seu e-mail">
                    </div>

                    <div class="input-form">
                        <label for="password">Senha</label>
                        <input id="password" type="password" placeholder="Crie a sua senha">
                    </div>


                    <p>Esqueceu a senha? <a href="/">Recuperar</a></p>

                    <button class="action-button" type="submit">Entrar</button>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
